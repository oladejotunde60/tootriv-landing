        <h2 style="font-size:1.5rem;color:#0A8754;margin-bottom:12px">Instant Salary Advances for Every Worker</h2>
        <p>TooTriv is a digital lending platform providing fast, affordable, collateral-free salary-backed loans. Employees can access up to ₦100,000 in under 5 minutes - via USSD, Web, or Mobile.</p>

        <h2 style="font-size:1.3rem;margin-top:32px;color:#0A8754">About Us</h2>
        <p>TooTriv Finance Limited (RC 9392905) is a registered Nigerian fintech company headquartered in Lagos. We are building a digital lending platform that provides fast, affordable, and collateral-free salary-backed loans to salaried employees.</p>
        <p>Founded in 2025 by Tunde Oladejo and Rasheed Isiaq, TooTriv was born from a simple observation: millions of Nigerian workers live paycheck to paycheck, and when emergencies strike, they have nowhere to turn except predatory lenders. We're changing that.</p>

        <h2 style="font-size:1.3rem;margin-top:32px;color:#0A8754">How It Works</h2>
        <ol>
          <li><strong>Register</strong> - Sign up with your BVN via USSD, Web, or Mobile. We auto-verify your identity in seconds.</li>
          <li><strong>Get Scored</strong> - Our AI-powered credit engine assesses your salary history, employer rating, and credit profile instantly.</li>
          <li><strong>Receive Funds</strong> - Approved loans are disbursed directly to your bank account in under 5 minutes - 24/7.</li>
          <li><strong>Auto-Repay</strong> - Repayment is deducted automatically from your salary via direct debit mandate on payday.</li>
        </ol>

        <h2 style="font-size:1.3rem;margin-top:32px;color:#0A8754">Why TooTriv?</h2>
        <ul>
          <li><strong>Instant Disbursement</strong> - Loans approved and disbursed in under 5 minutes, anytime, anywhere.</li>
          <li><strong>Multi-Channel Access</strong> - Apply via USSD (feature phones), web app, or mobile app.</li>
          <li><strong>AI Credit Scoring</strong> - Proprietary scoring engine using salary history, BVN, credit bureaus, and employer data.</li>
          <li><strong>Lower Interest Rates</strong> - 7-10% monthly, significantly lower than market competitors charging 15-30%.</li>
          <li><strong>Employer Partnerships</strong> - We partner with companies to offer TooTriv as an employee benefit.</li>
          <li><strong>Bank-Grade Security</strong> - BVN validation, encrypted KYC, multi-factor authentication, end-to-end encryption.</li>
        </ul>
